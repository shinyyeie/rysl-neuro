<style>
:root{--b:#08080c;--c:#12121a;--t:#eee;--s:#777;--p:#ff2d78;--r:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--b);color:var(--t);font-family:-apple-system,sans-serif;height:100vh;overflow:hidden;font-size:14px}
.app{display:flex;flex-direction:column;height:100vh;max-width:550px;margin:0 auto;border-left:1px solid #1a1a25;border-right:1px solid #1a1a25}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--c);border-bottom:1px solid #1a1a25}
.logo{font-size:17px;font-weight:700}.logo span{color:var(--p)}
.ibtn{width:38px;height:38px;border-radius:50%;background:var(--b);border:1px solid #1a1a25;color:var(--t);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}

.group-card{background:var(--c);border:1px solid #1a1a25;border-radius:var(--r);padding:14px;margin:6px 0;cursor:pointer}
.group-card h4{font-size:14px}.group-card p{font-size:10px;color:var(--s);margin-top:2px}
.group-card.ai{border-color:var(--p)}

.back-btn{color:var(--p);cursor:pointer;font-size:13px;background:none;border:none;font-weight:600}
.chat-name{font-size:14px;font-weight:600;flex:1}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.msg{max-width:85%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word;position:relative}
.msg.user{background:var(--p);align-self:flex-end;border-bottom-right-radius:4px;color:#fff}
.msg.ai{background:#150d12;align-self:flex-start;border-bottom-left-radius:4px;border:1px solid rgba(255,45,120,0.12)}
.msg .sender{font-size:9px;color:#ff6b9d;margin-bottom:3px;font-weight:700}
.msg .copy{position:absolute;top:4px;right:6px;background:rgba(0,0,0,0.5);border:none;color:var(--s);cursor:pointer;font-size:9px;padding:3px 7px;border-radius:10px;opacity:0}
.msg:hover .copy{opacity:1}
.input-area{display:flex;gap:6px;padding:10px 14px;background:var(--c);border-top:1px solid #1a1a25}
.input-area input{flex:1;padding:10px 14px;background:var(--b);border:1px solid #1a1a25;border-radius:25px;color:var(--t);font-size:13px;outline:none}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--p);border:none;color:#fff;font-size:20px;cursor:pointer}
.typing{display:flex;gap:3px;padding:10px 14px;align-self:flex-start}
.typing span{width:5px;height:5px;background:var(--p);border-radius:50%;animation:ty 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{opacity:0.2}30%{opacity:1}}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:center;justify-content:center}
.modal.on{display:flex}
.modal-box{background:var(--c);border:1px solid #1a1a25;border-radius:var(--r);padding:24px;width:90%;max-width:320px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:12px}
.modal-input{width:100%;padding:12px;background:var(--b);border:1px solid #1a1a25;border-radius:14px;color:var(--t);font-size:13px;outline:none;margin:4px 0}
.modal-input:focus{border-color:var(--p)}
.modal-btn{width:100%;padding:12px;background:var(--p);color:#fff;border:none;border-radius:14px;font-weight:600;cursor:pointer;margin-top:8px;font-size:14px}
.modal-btn.red{background:#e74c3c}
.modal-btn.ghost{background:transparent;color:var(--p);border:1px solid var(--p)}
.modal-close{float:right;color:var(--s);cursor:pointer;background:none;border:none;font-size:22px}
.modal-err{color:#f44;font-size:10px;text-align:center;min-height:14px;margin-top:4px}
.modal-link{text-align:center;margin-top:10px;font-size:11px;color:var(--s)}.modal-link a{color:var(--p)}
.admin-box{background:var(--b);border:1px solid #1a1a25;border-radius:14px;padding:10px;font-size:10px;max-height:180px;overflow-y:auto;font-family:monospace;color:var(--s)}
.admin-row{display:flex;gap:6px}.admin-row input{flex:1}
.hidden{display:none!important}
.empty{text-align:center;padding:40px 20px;color:var(--s)}.empty h3{color:var(--t)}
.ads{text-align:center;padding:6px;font-size:9px;color:#444;border-top:1px solid #1a1a25;background:var(--c)}
.ads a{color:#555;text-decoration:none}
</style>
</head>
